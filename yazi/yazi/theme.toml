# Сolor palette: https://stephango.com/flexoki
# ---
# black       "#100F0F" bg
# base-950    "#1C1B1A" bg-2
# base-900    "#282726" ui
# base-850    "#343331" ui-2
# base-800    "#403E3C" ui-3
# base-700    "#575653" tx-3
# base-500    "#878580" tx-2
# base-200    "#CECDC3" tx
# red-400     "#D14D41" re
# orange-400  "#DA702C" or
# yellow-400  "#D0A215" ye
# yellow-600  "#AD8301" ye-2
# green-400   "#879A39" gr
# cyan-400    "#3AA99F" cy
# cyan-600    "#24837B" cy-2
# cyan-700    "#1C6C66" cy-700
# cyan-900    "#122F2C" cy-900
# blue-400    "#4385BE" bl
# purple-400  "#8B7EC8" pu
# magenta-400 "#CE5D97" ma

[flavor]
dark = "flexoki-dark"

[filetype]
rules = [
  # Media Files
  { mime = "image/*", fg = "#6b978f" },
  { mime = "video/*", fg = "#8883a5" },
  { mime = "sound/*", fg = "#6986a0" },

  # Documents
  { mime = "application/{doc,epub,pdf,rtf}", fg = "#879062" },

  # Archives
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#b37d5e" },

  # Empty files
  { mime = "inode/empty", fg = "#575653" },

  # Special files
  { url = "*", is = "orphan", fg = "#D14D41", bg = "#38110e"},
  { url = "*/", is = "orphan", fg = "#D14D41", bg = "#38110e" },
  { url = "*", is = "link", fg = "#3AA99F" },
  { url = "*/", is = "link", fg = "#3AA99F" },
  { url = "*", is = "block", fg = "#CECDC3" },
  { url = "*", is = "char", fg = "#CECDC3" },
  { url = "*", is = "fifo", fg = "#CE5D97" },
  { url = "*", is = "sock", fg = "#CE5D97" },
  { url = "*", is = "sticky", fg = "#CECDC3" },
  { url = "*", is = "dummy", fg = "#575653" },

  # Fallback
  { url = "*/", fg = "#CECDC3" },
  { url = "*", is = "exec", fg = "#879A39" },
  { url = "*", fg = "#878580" }
]
