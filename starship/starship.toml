# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = '''
[оӮ¶](fg:first)$os[ ](inverted fg:prev_fg bg:prev_bg)$username[оӮ°](fg:prev_fg bg:second)$hostname[оӮ°](fg:prev_bg bg:third)$directory[оӮ°](fg:prev_bg bg:fourth)$git_branch$git_status[оӮҙ](fg:prev_bg)$fill[оӮ¶](fg:dark_red bg:prev_bg)$status$sudo[оӮ°](fg:prev_bg bg:light_red)$cmd_duration[оӮ°](fg:prev_bg bg:lighter_red)$time[оӮҙ](fg:prev_bg)
$character
'''
palette = 'cyan'

[username]
style_user = 'inverted fg:prev_fg bg:prev_bg'
style_root = 'fg:red bg:prev_fg'
format = '[ $user ]($style)'
show_always = true

[hostname]
ssh_only = true
ssh_symbol = 'о¬Ғ'
trim_at = ''
style = 'fg:black bg:prev_bg'
format = '[ $hostname $ssh_symbol ]($style)'

[directory]
read_only = 'пҖЈ '
read_only_style = 'bg:prev_bg fg:first'
style = 'fg:black bg:prev_bg'
home_symbol = 'пҖ•  ~'
format = '[ $path ]($style)[($read_only)]($read_only_style)'

[git_branch]
style = 'bg:prev_bg fg:black'
format = '[ $symbol$branch(:$remote_branch)]($style)'

[git_status]
format = '([ \[$all_status$ahead_behind\]]($style))'
conflicted = 'п“ң'
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'
style = 'bg:prev_bg fg:dark_red'

[fill]
symbol = ' '

[status]
format = '[$symbol ]($style)'
map_symbol = true
symbol = 'вңҳ'
success_symbol = 'вң“'
not_executable_symbol = 'оӘҪ'
not_found_symbol = 'оӯҺ'
sigint_symbol = 'пҠҚ'
signal_symbol = 'оҖҠ'
disabled = false
style = 'bg:dark_red fg:black'

[sudo]
symbol = 'ојҒ'
style = 'bg:prev_bg fg:prev_fg'
disabled = false
format = '[$symbol ]($style)'

[cmd_duration]
min_time = 500
show_milliseconds = true
format = '[ п”  $duration ]($style)'
style = 'bg:prev_bg fg:black'
show_notifications = false
min_time_to_notify = 20_000

[time]
format = '[ $time пҖ— ]($style)'
disabled = false
time_format = '%T'
style = 'bg:prev_bg fg:black'

[character]
success_symbol = '[вқҜ](bold green)'
error_symbol = '[вқҜ](bold red)'
format = '$symbol '



